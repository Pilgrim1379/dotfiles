
[tools]
## Core runtimes — all pinned for stability (review quarterly)
python = ["3.14", "3.12"]

erlang = "28"
elixir = "1.19"
ruby  = "4"
zig = "latest"
java = "temurin-25"
#elm   = "latest"   # no semver releases; latest is safe here
# dotnet SDK — managed by Microsoft installer, not mise
# See: https://dotnet.microsoft.com/en-us/download
# "dotnet = latest" intentionally omitted to avoid shadowing the system install

## Node ecosystem
node  = "26"
deno  = "2.7"
npm = "11"
# pnpm  = "11"
aube = "latest"


## npm-based tooling
"npm:vscode-markdown-languageserver"  = "latest"
"npm:np"                              = "latest"
"npm:@tailwindcss/language-server"    = "latest"
"npm:@vtsls/language-server"          = "latest"
"npm:yaml-language-server"            = "latest"
"npm:typescript"                      = "latest"
"npm:neovim"                          = "latest"
"npm:stylelint"                       = "latest"
"npm:wscat"                           = "latest"
"npm:bash-language-server"            = "latest"
"npm:vscode-langservers-extracted"    = "latest"
"npm:@vue/language-server"            = "latest"
"npm:@biomejs/biome"                  = "latest"
# "npm:@olrtg/emmet-language-server"    = "latest"
# prettier-plugin-elm: kept intentionally — Biome does not support Elm,
# so Prettier remains the formatter for .elm files
#"npm:prettier-plugin-elm"             = "latest"
#"npm:elm-test"                        = "latest"
#"npm:@elm-tooling/elm-language-server" = "latest"
#"npm:elm-format"                      = "latest"
## "npm:elm-oracle"                      = "latest"
# "npm:elm-review"                      = "latest"
# "npm:elm-live"                        = "latest"

# -----------------------------
# Python System (minimal only)
# -----------------------------
[tasks."python:system"]
run = """
echo "Installing minimal system Python packages"
# pynvim and debugpy are installed with --system intentionally:
# pynvim must be importable by Neovim's rplugin host (which doesn't use uv tool envs),
# and debugpy is consumed directly by nvim-dap rather than as a standalone CLI.
uv pip install -U --system \
  pynvim \
  debugpy
"""


# -----------------------------
# Python Tooling (main setup)
# -----------------------------
[tasks."python:tools"]
depends = ["python:system"]
run = """
# Guard: ensure Python 3.14 is actually installed before proceeding
if ! mise where python 3.14 &>/dev/null; then
  echo "ERROR: Python 3.14 is not installed. Run 'mise install python 3.14' first."
  exit 1
fi

TOOLS_PY=$(mise where python 3.14)/bin/python

echo "Installing core dev tools"
for tool in ruff ty codespell; do
  uv tool install --force --python "$TOOLS_PY" "$tool"
done

echo "Installing CLI tools"
for tool in neovim-remote xxh-xxh asciinema; do
  uv tool install --force --python "$TOOLS_PY" "$tool"
done

echo "Installing build tools"
for tool in pyinstaller sphinx; do
  uv tool install --force --python "$TOOLS_PY" "$tool"
done

echo "Installing data tools"
uv tool install --force --python "$TOOLS_PY" ipython

echo "Installing Jupyter stack"
uv tool install --force --python "$TOOLS_PY" \
  --with catppuccin-jupyterlab \
  --with catppuccin-matplotlib \
  --with "catppuccin[pygments]" \
  --with jupyterlab-lsp \
  --with jupyterlab-git \
  --with jupyterlab_code_formatter \
  --with jupyterlab_templates \
  --with python-lsp-server \
  --with ipywidgets \
  jupyterlab
"""


# -----------------------------
# Diagnostics
# -----------------------------
[tasks."python:doctor"]
run = """
echo "Python version:"
python -V

echo "\nInstalled uv tools:"
uv tool list

echo "\nSystem packages:"
pip list
"""


# -----------------------------
# Hooks
# -----------------------------
[hooks]
postinstall = '''
STAMP="$HOME/.cache/mise/python-tools.stamp"
CURRENT=$(mise current python 2>/dev/null | grep -E "^3\.14" | head -1)

[ -z "$CURRENT" ] && exit 0

PREVIOUS=$(cat "$STAMP" 2>/dev/null || true)

if [ "$CURRENT" != "$PREVIOUS" ]; then
  mise run python:tools
  echo "$CURRENT" > "$STAMP"
fi
'''


# -----------------------------
# Settings
# -----------------------------
[settings]
idiomatic_version_file = false
idiomatic_version_file_enable_tools = []

always_keep_download = false
always_keep_install  = false

plugin_autoupdate_last_check_duration = '1 week'

trusted_config_paths = ['~/workspace']

verbose      = false
http_timeout = "30s"
jobs         = 4
raw          = false
yes          = false

not_found_auto_install = true
task_output            = "prefix"
paranoid               = false

shorthands_file           = '~/.config/mise/shorthands.toml'
disable_default_registry  = false

# env_file removed from global config — loading a project .env globally risks
# leaking secrets (DATABASE_URL, API keys, etc.) into every shell session.
# Enable per-project in a local mise.toml instead: env_file = '.env'

# experimental enables the task runner and python.compile/ruby.compile flags below
experimental = true
python.compile = false
ruby.compile   = false

# npm.package_manager = "pnpm"
npm.package_manager = "aube"

status = { missing_tools = "if_other_versions_installed", show_env = false, show_tools = false }
